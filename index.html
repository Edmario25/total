<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Orações Diárias</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f59e0b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Orações">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:linear-gradient(160deg,#fffbeb 0%,#fef3c7 40%,#fde68a 100%)}
  body{display:flex;flex-direction:column;align-items:center;justify-content:center;
       font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
       padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}

  .logo{width:96px;height:96px;background:linear-gradient(135deg,#f59e0b,#d97706);
        border-radius:28px;display:flex;align-items:center;justify-content:center;
        box-shadow:0 20px 40px rgba(245,158,11,.35);
        animation:popIn .6s cubic-bezier(.34,1.56,.64,1) both}

  .cross{position:relative;width:46px;height:46px}
  .cross::before,.cross::after{content:'';position:absolute;background:white;border-radius:3px}
  .cross::before{width:8px;height:100%;left:50%;top:0;transform:translateX(-50%)}
  .cross::after{width:100%;height:8px;top:38%;left:0}

  h1{margin-top:28px;font-size:26px;font-weight:800;color:#92400e;letter-spacing:-.5px;
     animation:fadeUp .5s .2s ease both}
  p{margin-top:8px;font-size:14px;color:#b45309;opacity:.8;
    animation:fadeUp .5s .35s ease both}

  .dots{display:flex;gap:6px;margin-top:40px;animation:fadeUp .5s .5s ease both}
  .dot{width:8px;height:8px;border-radius:50%;background:#f59e0b;opacity:.3;
       animation:pulse 1.2s ease-in-out infinite}
  .dot:nth-child(2){animation-delay:.2s}
  .dot:nth-child(3){animation-delay:.4s}

  @keyframes popIn{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
  @keyframes fadeUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
  @keyframes pulse{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:1;transform:scale(1.2)}}
</style>
</head>
<body>
  <div class="logo"><div class="cross"></div></div>
  <h1>Orações Diárias</h1>
  <p>Sua jornada espiritual, todo dia 🙏</p>
  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  <script>
    // Redireciona após a animação de splash (800ms)
    setTimeout(() => { window.location.replace('./app.html'); }, 800);
  </script>
</body>
</html>
